<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blythello - Hall of Fame</title>
    <link rel="icon" href="https://img.icons8.com/color/48/000000/doll--v1.png" type="image/x-icon">
    <style>
        :root {
            --main-bg: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 100%);
            --accent-color: #ffb7c5;
            --text-dark: #2d3436;
            --text-gray: #636e72;
            --vip-purple: #8854d0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--main-bg);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px; width: 95%; min-height: 80vh;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .logo { font-size: 1.6rem; font-weight: bold; }
        .brand { color: var(--vip-purple); }

        .language-selector { display: flex; gap: 8px; flex-wrap: wrap; }

        .lang-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(136, 84, 208, 0.3);
            border-radius: 20px;
            padding: 6px 12px; font-size: 0.8rem;
            cursor: pointer; transition: all 0.3s ease;
        }

        .lang-btn.active { background: var(--vip-purple); color: white; border-color: var(--vip-purple); }

        .content { display: flex; gap: 40px; align-items: center; flex: 1; }

        .left-side { flex: 1; display: flex; justify-content: center; }

        .doll-face-animation {
            max-width: 100%; max-height: 50vh;
            opacity: 0; filter: blur(15px);
            transform: translateY(25px);
            animation: magicReveal 3.5s ease-out forwards;
            border-radius: 15px;
            object-fit: contain;
        }

        @keyframes magicReveal {
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        .right-side { flex: 1.2; display: flex; flex-direction: column; }

        .main-title {
            font-size: 3rem; font-weight: 900;
            background: linear-gradient(45deg, var(--text-dark), var(--vip-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        .subtitle { font-size: 1.2rem; color: var(--text-gray); margin-bottom: 20px; }

        .promo-box {
            padding: 20px; border-left: 4px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0 10px 10px 0; margin-bottom: 15px;
        }

        .status-highlight { color: var(--vip-purple); font-weight: bold; margin: 15px 0; }

        .contest-rules {
            font-size: 0.85rem; color: var(--text-gray); font-style: italic;
            border: 1px dashed var(--accent-color); padding: 8px; border-radius: 8px;
        }

        .email-info {
            background: rgba(136, 84, 208, 0.08); padding: 12px;
            border-radius: 8px; border-left: 3px solid var(--vip-purple); margin-top: 15px;
        }

        .email-link { color: var(--vip-purple); font-weight: bold; text-decoration: none; }

        .loader-container {
            background: rgba(255, 255, 255, 0.6); padding: 20px;
            border-radius: 20px; margin: 20px 0;
            border: 2px solid rgba(255, 183, 197, 0.3);
        }

        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; margin: 10px 0; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; width: 35%; background: linear-gradient(90deg, var(--accent-color), #ff8ba0); border-radius: 5px; }

        .thanks-note { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); color: var(--text-gray); font-size: 0.85rem; }
        .insta-link { color: var(--vip-purple); font-weight: bold; text-decoration: none; }

        @media (max-width: 768px) {
            .container { height: auto; padding: 20px; }
            .content { flex-direction: column; }
            .main-title { font-size: 2.2rem; text-align: center; }
            .subtitle { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><span class="brand">Blythello</span>.com</div>
            <div class="language-selector">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="de">DE</button>
                <button class="lang-btn" data-lang="fr">FR</button>
                <button class="lang-btn active" data-lang="ja">JA</button>
            </div>
        </div>

        <main class="content">
            <div class="left-side">
                <img src="Gemini_Generated_Image_mce530mce530mce5.png" alt="Blythe Doll" class="doll-face-animation">
            </div>

            <div class="right-side">
                <h1 class="main-title" data-key="title">もうすぐ準備完了です！</h1>
                <p class="subtitle" data-key="subtitle">ブライスの世界が間もなく登場します。</p>
                
                <div class="promo-box">
                    <p data-key="promo1">Instagramにアクセスし、<strong>@**riteradolls</strong>を見つけて、そのフルネームをメールでお送りください。</p>
                    <p class="status-highlight" data-key="promo2">これにより、創設メンバーとして「殿堂」に名を刻むことができます！</p>
                    <p class="contest-rules" data-key="rules">24時間ごとに1名の参加者が選ばれます。</p>
                    
                    <div class="email-info">
                        <strong data-key="emailTitle">フルネームとご提案をこちらまで：</strong><br>
                        <a href="mailto:blythello@blythello.com" class="email-link">blythello@blythello.com</a>
                    </div>
                </div>

                <div class="loader-container">
                    <span class="loader-text" data-key="loading">近日公開...</span>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>

                <div class="thanks-note">
                    <span data-key="thanks">サイト運営者は</span> 
                    <a href="https://instagram.com/moriteradolls" target="_blank" class="insta-link">@**riteradolls</a> 
                    <span data-key="thanks2">の知的貢献に感謝いたします。</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const translations = {
            en: {
                title: "WE'RE ALMOST READY!",
                subtitle: "The world of Blythe is coming soon.",
                promo1: "Go to Instagram, find <strong>@**riteradolls</strong> and send the full name to our email.",
                promo2: "By doing this, you can become a <strong>Founding Member</strong> and enter our 'Hall of Fame'!",
                rules: "One participant is chosen every 24 hours.",
                emailTitle: "Send the full name and suggestions to:",
                loading: "LAUNCHING SOON...",
                thanks: "The site administration thanks",
                thanks2: "for her intellectual contribution."
            },
            de: {
                title: "WIR SIND FAST FERTIG!",
                subtitle: "Die Welt von Blythe kommt bald.",
                promo1: "Gehen Sie zu Instagram, finden Sie <strong>@**riteradolls</strong> und senden Sie den vollständigen Namen an unsere E-Mail.",
                promo2: "So können Sie <strong>Gründungsmitglied</strong> werden und in unsere 'Hall of Fame' eingehen!",
                rules: "Alle 24 Stunden wird ein Teilnehmer ausgewählt.",
                emailTitle: "Senden Sie den Namen und Vorschläge an:",
                loading: "START BALD...",
                thanks: "Die Website-Verwaltung dankt",
                thanks2: "für ihren intellektuellen Beitrag."
            },
            fr: {
                title: "NOUS SOMMES PRÊTS !",
                subtitle: "Le monde de Blythe arrive bientôt.",
                promo1: "Allez sur Instagram, trouvez <strong>@**riteradolls</strong> et envoyez le nom complet à notre e-mail.",
                promo2: "Devenez un <strong>Membre Fondateur</strong> et entrez dans notre 'Hall of Fame' !",
                rules: "Un participant est choisi toutes les 24 heures.",
                emailTitle: "Envoyez le nom et les suggestions à :",
                loading: "LANCEMENT BIENTÔT...",
                thanks: "L'administration du site remercie",
                thanks2: "pour sa contribution intellectuelle."
            },
            ja: {
                title: "もうすぐ準備完了です！",
                subtitle: "ブライスの世界が間もなく登場します。",
                promo1: "Instagramにアクセスし、<strong>@**riteradolls</strong>を見つけて、そのフルネームをメールでお送りください。",
                promo2: "これにより、<strong>創設メンバー</strong>として「殿堂」に名を刻むことができます！",
                rules: "24時間ごとに1名の参加者が選ばれます。",
                emailTitle: "フルネームとご提案をこちらまで：",
                loading: "近日公開...",
                thanks: "サイト運営者は",
                thanks2: "の知的貢献に感謝いたします。"
            }
        };

        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => changeLanguage(btn.dataset.lang));
        });
    </script>
</body>
</html>
