<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blythello - Hall of Fame</title>
    <link rel="icon" href="https://img.icons8.com/color/48/000000/doll--v1.png" type="image/x-icon">
    <style>
        :root {
            --main-bg: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 100%);
            --accent-color: #ffb7c5;
            --text-dark: #2d3436;
            --text-gray: #636e72;
            --vip-purple: #8854d0;
            --fame-gold: #f1c40f; 
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 20px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--main-bg);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            align-items: stretch;
        }

        .container {
            flex: 3;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        .hall-of-fame-sidebar {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border: 4px solid var(--fame-gold);
            border-radius: 25px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .sidebar-title {
            color: #d63031;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .winner-list { list-style: none; padding: 0; margin: 0; }

        .winner-item {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--vip-purple);
            padding-bottom: 10px;
            border-bottom: 2px solid #d63031;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .winner-date { font-size: 0.8rem; color: var(--text-gray); font-weight: normal; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 1.6rem; font-weight: bold; }
        .brand { color: var(--vip-purple); }

        .language-selector { display: flex; gap: 8px; flex-wrap: wrap; }
        .lang-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(136, 84, 208, 0.3);
            border-radius: 20px;
            padding: 6px 12px; font-size: 0.8rem;
            cursor: pointer; transition: all 0.3s ease;
        }
        .lang-btn.active { background: var(--vip-purple); color: white; border-color: var(--vip-purple); }

        .content { display: flex; gap: 40px; align-items: center; flex: 1; }
        .left-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .doll-face-animation {
            max-width: 100%; max-height: 45vh;
            border-radius: 15px;
            object-fit: contain;
            animation: magicReveal 2s ease-out forwards;
            transition: opacity 0.5s ease;
        }

        @keyframes magicReveal {
            from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        /* Кнопки управления галереей */
        .gallery-nav {
            display: flex; gap: 10px; margin-top: 15px; opacity: 0; transition: 1s ease;
        }
        .btn-gallery { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-like { background: white; color: #ff7675; border: 1px solid #ff7675; }
        .btn-like:disabled { background: #ff7675; color: white; }
        .btn-next { background: var(--vip-purple); color: white; }

        .right-side { flex: 1.5; display: flex; flex-direction: column; }
        .main-title {
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(45deg, var(--text-dark), var(--vip-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        .subtitle { font-size: 1.1rem; color: var(--text-gray); margin-bottom: 20px; }

        .promo-box {
            padding: 20px; border-left: 4px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0 10px 10px 0; margin-bottom: 15px;
        }

        .status-highlight { color: var(--vip-purple); font-weight: bold; margin: 10px 0; }
        .contest-rules { font-size: 0.85rem; color: var(--text-gray); font-style: italic; border: 1px dashed var(--accent-color); padding: 8px; border-radius: 8px; }
        
        .email-info { background: rgba(136, 84, 208, 0.08); padding: 12px; border-radius: 8px; border-left: 3px solid var(--vip-purple); margin-top: 15px; }
        .email-link { color: var(--vip-purple); font-weight: bold; text-decoration: none; }

        .loader-container { background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 20px; margin: 15px 0; border: 2px solid rgba(255, 183, 197, 0.3); }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 35%; background: linear-gradient(90deg, var(--accent-color), #ff8ba0); border-radius: 5px; }

        .thanks-note { margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); color: var(--text-gray); font-size: 0.8rem; }
        .insta-link { color: var(--vip-purple); font-weight: bold; text-decoration: none; }

        @media (max-width: 992px) {
            .wrapper { flex-direction: column; }
            .container { order: 1; }
            .hall-of-fame-sidebar { order: 2; width: 100%; }
            .content { flex-direction: column; text-align: center; }
            .right-side { align-items: center; }
            .promo-box { border-left: none; border-top: 4px solid var(--accent-color); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <div class="header">
                <div class="logo"><span class="brand">Blythello</span>.com</div>
                <div class="language-selector">
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                    <button class="lang-btn" data-lang="fr">FR</button>
                    <button class="lang-btn active" data-lang="ja">JA</button>
                </div>
            </div>

            <main class="content">
                <div class="left-side">
                    <img id="main-photo" src="Gemini_Generated_Image_mce530mce530mce5.png" alt="Blythe Doll" class="doll-face-animation">
                    <div class="gallery-nav" id="gallery-controls">
                        <button id="like-btn" class="btn-gallery btn-like" data-key="like">❤️ Like</button>
                        <button id="next-btn" class="btn-gallery btn-next" data-key="next">Next ✨</button>
                    </div>
                </div>

                <div class="right-side">
                    <h1 class="main-title" data-key="title">もうすぐ準備完了です！</h1>
                    <p class="subtitle" data-key="subtitle">ブライスの世界が間もなく登場します。</p>
                    
                    <div class="promo-box">
                        <p data-key="promo1">Instagramにアクセスし、<strong>@**riteradolls</strong>を見つけて、そのフルネームをメールでお送りください。</p>
                        <p class="status-highlight" data-key="promo2">これにより、<strong>創設メンバー</strong>として「殿堂」に名を刻むことができます！</p>
                        <p class="contest-rules" data-key="rules">24時間ごとに1名の参加者が選ばれます。</p>
                        
                        <div class="email-info">
                            <strong data-key="emailTitle">フルネームとご提案をこちらまで：</strong><br>
                            <a href="mailto:blythello@blythello.com" class="email-link">blythello@blythello.com</a>
                        </div>
                    </div>

                    <div class="loader-container">
                        <span class="loader-text" data-key="loading">近日公開...</span>
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                    </div>

                    <div class="thanks-note">
                        <span data-key="thanks">サイト運営者は</span> 
                        <a href="https://instagram.com/moriteradolls" target="_blank" class="insta-link">@**riteradolls</a> 
                        <span data-key="thanks2">の知的貢献に感謝いたします。</span>
                    </div>
                </div>
            </main>
        </div>

        <aside class="hall-of-fame-sidebar">
            <div class="sidebar-title" data-key="sidebarTitle">初期から私たちを支えてくれている方々</div>
            <ul class="winner-list">
                <li class="winner-item">
                    <span>1. @ne0vdarks</span>
                    <span class="winner-date">20.02.2026</span>
                </li>
            </ul>
        </aside>
    </div>

    <script>
        const translations = {
            en: {
                title: "WE'RE ALMOST READY!",
                subtitle: "The world of Blythe is coming soon.",
                promo1: "Go to Instagram, find <strong>@**riteradolls</strong> and send the full name to our email.",
                promo2: "By doing this, you can become a <strong>Founding Member</strong> and enter our 'Hall of Fame'!",
                rules: "One participant is chosen every 24 hours.",
                emailTitle: "Send the full name and suggestions to:",
                loading: "LAUNCHING SOON...",
                thanks: "The site administration thanks",
                thanks2: "for her intellectual contribution.",
                sidebarTitle: "Those who have been with us since the first days",
                like: "❤️ Like", liked: "❤️ Liked", next: "Next ✨"
            },
            de: {
                title: "WIR SIND FAST BEREIT!",
                subtitle: "Die Welt von Blythe kommt bald.",
                promo1: "Gehen Sie zu Instagram, finden Sie <strong>@**riteradolls</strong>.",
                promo2: "Werden Sie <strong>Gründungsmitglied</strong> in unserer Hall of Fame!",
                rules: "Alle 24 Stunden wird ein Teilnehmer ausgewählt.",
                emailTitle: "Name und Vorschläge an:",
                loading: "STARTET BALD...",
                thanks: "Die Administration dankt",
                thanks2: "für ihren Beitrag.",
                sidebarTitle: "Unterstützer der ersten Stunde",
                like: "❤️ Like", liked: "❤️ Geliked", next: "Weiter ✨"
            },
            fr: {
                title: "NOUS SOMMES PRESQUE PRÊTS !",
                subtitle: "Le monde de Blythe arrive bientôt.",
                promo1: "Allez sur Instagram, trouvez <strong>@**riteradolls</strong>.",
                promo2: "Devenez un <strong>membre fondateur</strong> !",
                rules: "Un participant est choisi toutes les 24 heures.",
                emailTitle: "Nom et suggestions à :",
                loading: "LANCEMENT IMMINENT...",
                thanks: "L'administration remercie",
                thanks2: "pour sa contribution.",
                sidebarTitle: "Ceux qui sont avec nous depuis le début",
                like: "❤️ Like", liked: "❤️ Aimé", next: "Suivant ✨"
            },
            ja: {
                title: "もうすぐ準備完了です！",
                subtitle: "ブライスの世界が間もなく登場します。",
                promo1: "Instagramにアクセスし、<strong>@**riteradolls</strong>を見つけて、そのフルネームをメールでお送りください。",
                promo2: "これにより、<strong>創設メンバー</strong>として「殿堂」に名を刻むことができます！",
                rules: "24時間ごとに1名の参加者が選ばれます。",
                emailTitle: "フルネームとご提案をこちらまで：",
                loading: "近日公開...",
                thanks: "サイト運営者は",
                thanks2: "の知的貢献に感謝いたします。",
                sidebarTitle: "初期から私たちを支えてくれている方々",
                like: "❤️ いいね", liked: "❤️ 済み", next: "次へ ✨"
            }
        };

        let currentLang = 'ja';
        let imageList = [];
        const img = document.getElementById('main-photo');
        const nav = document.getElementById('gallery-controls');
        const likeBtn = document.getElementById('like-btn');
        const nextBtn = document.getElementById('next-btn');

        async function fetchImageList() {
            try {
                const response = await fetch('FG/1.txt');
                const text = await response.text();
                imageList = text.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
                if (imageList.length > 0) getNewPhoto();
            } catch (err) { console.error("Error loading FG/1.txt"); }
        }

        function getNewPhoto() {
            if (imageList.length === 0) return;
            const randomName = imageList[Math.floor(Math.random() * imageList.length)];
            const fileName = randomName.toLowerCase().endsWith('.jpg') ? randomName : randomName + '.jpg';
            const path = 'FG/' + fileName;

            img.style.opacity = '0';
            setTimeout(() => {
                img.src = path;
                img.style.opacity = '1';
                const savedLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
                likeBtn.disabled = savedLikes.includes(path);
                updateLabels();
            }, 500);
        }

        function updateLabels() {
            const t = translations[currentLang];
            likeBtn.innerText = likeBtn.disabled ? t.liked : t.like;
            nextBtn.innerText = t.next;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
            });
            updateLabels();
        }

        likeBtn.addEventListener('click', () => {
            const path = img.getAttribute('src');
            let savedLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
            if(!savedLikes.includes(path)) {
                savedLikes.push(path);
                localStorage.setItem('my_likes', JSON.stringify(savedLikes));
                likeBtn.disabled = true;
                updateLabels();
            }
        });

        nextBtn.addEventListener('click', getNewPhoto);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => changeLanguage(btn.dataset.lang));
        });

        window.onload = () => {
            // Кнопки появляются через 2.5 секунды, как и первое фото из списка
            setTimeout(() => {
                nav.style.opacity = '1';
                fetchImageList();
            }, 2500);
        };
    </script>
</body>
</html>
