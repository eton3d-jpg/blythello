<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blythello - Hall of Fame</title>
    <link rel="icon" href="https://img.icons8.com/color/48/000000/doll--v1.png" type="image/x-icon">
    <style>
        :root {
            --main-bg: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 100%);
            --accent-color: #ffb7c5;
            --text-dark: #2d3436;
            --text-gray: #636e72;
            --vip-purple: #8854d0;
            --fame-gold: #f1c40f;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 20px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--main-bg);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            align-items: stretch;
        }

        .container {
            flex: 3;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        .hall-of-fame-sidebar {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border: 4px solid var(--fame-gold);
            border-radius: 25px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .sidebar-title {
            color: #d63031;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .winner-item {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--vip-purple);
            padding-bottom: 10px;
            border-bottom: 2px solid #d63031;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 1.6rem; font-weight: bold; }
        .brand { color: var(--vip-purple); }

        .language-selector { display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(136, 84, 208, 0.3);
            border-radius: 20px;
            padding: 6px 12px; font-size: 0.8rem;
            cursor: pointer; transition: 0.3s;
        }
        .lang-btn.active { background: var(--vip-purple); color: white; }

        .content { display: flex; gap: 40px; align-items: center; flex: 1; }

        .left-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
        
        .photo-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        #main-photo {
            width: 100%;
            height: auto;
            max-height: 45vh;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: opacity 0.5s ease;
        }

        .gallery-nav {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .btn-gallery {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-like { background: white; color: #ff7675; border: 2px solid #ff7675; }
        .btn-like:disabled { background: #ff7675; color: white; cursor: default; }
        .btn-next { background: var(--vip-purple); color: white; }
        .btn-next:hover { transform: scale(1.05); }

        .right-side { flex: 1.5; display: flex; flex-direction: column; }
        .main-title { font-size: 2.5rem; font-weight: 900; margin: 0; background: linear-gradient(45deg, var(--text-dark), var(--vip-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .promo-box { padding: 20px; border-left: 4px solid var(--accent-color); background: rgba(255, 255, 255, 0.2); border-radius: 0 10px 10px 0; margin: 20px 0; }
        .loader-container { background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 20px; margin: 15px 0; }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 35%; background: linear-gradient(90deg, var(--accent-color), #ff8ba0); }

        @media (max-width: 992px) {
            .wrapper { flex-direction: column; }
            .content { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <div class="header">
                <div class="logo"><span class="brand">Blythello</span>.com</div>
                <div class="language-selector">
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn active" data-lang="ja">JA</button>
                </div>
            </div>

            <main class="content">
                <div class="left-side">
                    <div class="photo-container">
                        <img id="main-photo" src="Gemini_Generated_Image_mce530mce530mce5.png" alt="Blythe">
                        <div class="gallery-nav" id="gallery-controls">
                            <button id="like-btn" class="btn-gallery btn-like">❤️ Like</button>
                            <button id="next-btn" class="btn-gallery btn-next">Next ✨</button>
                        </div>
                    </div>
                </div>

                <div class="right-side">
                    <h1 class="main-title" data-key="title">もうすぐ準備完了です！</h1>
                    <p class="subtitle" data-key="subtitle">ブライスの世界が間もなく登場します。</p>
                    
                    <div class="promo-box">
                        <p data-key="promo1">Instagramにアクセスし、<strong>@**riteradolls</strong>を見つけて、そのフルネームをメールでお送りください。</p>
                        <p style="color:var(--vip-purple); font-weight:bold;" data-key="promo2">創設メンバーとして「殿堂」に名を刻むことができます！</p>
                        <div style="background:rgba(136,84,208,0.1); padding:10px; border-radius:10px; margin-top:10px;">
                            <a href="mailto:blythello@blythello.com" style="color:var(--vip-purple); text-decoration:none; font-weight:bold;">blythello@blythello.com</a>
                        </div>
                    </div>

                    <div class="loader-container">
                        <span data-key="loading">近日公開...</span>
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                    </div>
                </div>
            </main>
        </div>

        <aside class="hall-of-fame-sidebar">
            <div class="sidebar-title" data-key="sidebarTitle">初期から私たちを支えてくれている方々</div>
            <ul class="winner-list" id="winners">
                <li class="winner-item">
                    <span>1. @ne0vdarks</span>
                    <span style="font-size:0.8rem; color:var(--text-gray);">20.02.2026</span>
                </li>
            </ul>
        </aside>
    </div>

    <script>
        const translations = {
            en: {
                title: "WE'RE ALMOST READY!",
                subtitle: "The world of Blythe is coming soon.",
                promo1: "Find <strong>@**riteradolls</strong> on Instagram and email us their full name.",
                promo2: "Become a Founding Member in our Hall of Fame!",
                loading: "LAUNCHING SOON...",
                sidebarTitle: "Early Supporters",
                like: "❤️ Like",
                liked: "❤️ Liked",
                next: "Next ✨"
            },
            ja: {
                title: "もうすぐ準備完了です！",
                subtitle: "ブライスの世界が間もなく登場します。",
                promo1: "Instagramで <strong>@**riteradolls</strong> を見つけ、フルネームをメールしてください。",
                promo2: "創設メンバーとして殿堂入りしましょう！",
                loading: "近日公開...",
                sidebarTitle: "初期サポーター",
                like: "❤️ いいね",
                liked: "❤️ 済み",
                next: "次へ ✨"
            }
        };

        const config = {
            currentLang: 'ja',
            folder: 'FG'
        };

        let imageList = [];
        const img = document.getElementById('main-photo');
        const controls = document.getElementById('gallery-controls');
        const likeBtn = document.getElementById('like-btn');
        const nextBtn = document.getElementById('next-btn');

        // Загрузка списка имен из 1.txt
        async function fetchImageList() {
            try {
                const response = await fetch(config.folder + '/1.txt');
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                imageList = text.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
                if (imageList.length > 0) getNewPhoto();
            } catch (err) {
                console.error("Error: Make sure FG/1.txt exists and is accessible.", err);
            }
        }

        function updateLabels() {
            const t = translations[config.currentLang];
            likeBtn.innerText = likeBtn.disabled ? t.liked : t.like;
            nextBtn.innerText = t.next;
        }

        function getNewPhoto() {
            if (imageList.length === 0) return;

            const randomName = imageList[Math.floor(Math.random() * imageList.length)];
            const fileName = randomName.toLowerCase().endsWith('.jpg') ? randomName : randomName + '.jpg';
            const path = config.folder + '/' + fileName;

            img.style.opacity = '0';
            setTimeout(() => {
                img.src = path;
                img.style.opacity = '1';
                
                const savedLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
                likeBtn.disabled = savedLikes.includes(path);
                updateLabels();
            }, 500);
        }

        likeBtn.addEventListener('click', () => {
            const path = img.getAttribute('src');
            let savedLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
            if(!savedLikes.includes(path)) {
                savedLikes.push(path);
                localStorage.setItem('my_likes', JSON.stringify(savedLikes));
                likeBtn.disabled = true;
                updateLabels();
            }
        });

        nextBtn.addEventListener('click', getNewPhoto);

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                config.currentLang = btn.dataset.lang;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.querySelectorAll('[data-key]').forEach(el => {
                    const key = el.getAttribute('data-key');
                    el.innerHTML = translations[config.currentLang][key];
                });
                updateLabels();
            });
        });

        window.onload = () => {
            // Дизайн как был: через 2.5 сек показываем кнопки и загружаем первое фото
            setTimeout(() => {
                controls.style.opacity = '1';
                fetchImageList();
            }, 2500);
        };
    </script>
</body>
</html>
